<!DOCTYPE html>

<style>

  :root {
    --ink: #1a1008;
    --paper: #f5efe0;
    --paper-dark: #e8dcc8;
    --red: #c0392b;

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,160,110,0.12) 39px, rgba(180,160,110,0.12) 40px),

    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    text-align: center;
    padding: 28px 20px 20px;
    border-bottom: 2px solid var(--border);
    background: linear-gradient(to bottom, #ede3c8, var(--paper));
    position: relative;
  }

  header::before, header::after {
    content: '❧';
    color: var(--gold);
    font-size: 1.3rem;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }
  header::before { left: 25px; }
  header::after { right: 25px; transform: translateY(-50%) scaleX(-1); }

  header h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--ink);
    text-shadow: 1px 2px 0 rgba(160,130,60,0.25);
    margin-right: -0.3em;

  header p {
    font-size: 0.75rem;
    color: #7a6a50;
    margin-top: 6px;

  }

  .settings-gear {
    position: absolute;
    top: 20px;
    right: 24px;
    cursor: pointer;
    font-size: 1.9rem;
    background: none;
    border: none;
    color: var(--gold);
    transition: transform 0.2s ease, color 0.2s;
    z-index: 120;
    background: rgba(245, 239, 224, 0.6);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .settings-gear:hover {
    transform: rotate(25deg);
    color: var(--red);
    background: rgba(245, 239, 224, 0.95);
  }

  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(30, 20, 10, 0.6);
    backdrop-filter: blur(5px);
    z-index: 2000;
    justify-content: center;
    align-items: center;
  }
  .modal.active {
    display: flex;
  }
  .modal-card {
    background: var(--cream-light);
    border-radius: 32px;
    max-width: 460px;
    width: 90%;
    padding: 28px 24px 32px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 35px rgba(0,0,0,0.2);
    text-align: center;
  }
  .modal-card h3 {

  }
  .modal-card p {

  }
  .api-input {
    width: 100%;
    padding: 12px 16px;
    font-family: monospace;
    border: 1px solid var(--border);
    border-radius: 48px;
    background: white;

  .api-input:focus {

  .modal-buttons {

  .btn-save, .btn-cancel {

const grid = document.getElementById('char-grid');

async function fetchRealTimeWords(ch, apiKey) {
  const systemPrompt = `你是资深对外汉语专家，专门帮外国学生掌握地道中文。对于用户提供的汉字，生成5个最常用的包含该汉字的词语（2~4字）。每个词语需附带：
- 英文释义（准确且生活化）
- 中文例句（自然口语或常用书面语，体现真实场景）
- 英文翻译例句（与中文对应，流畅自然）
输出格式必须为严格的JSON数组，例如：
[{"word":"词语","meaning":"English meaning","example":"中文例句。","example_en":"English example sentence."}]
不要任何额外解释、注意只用双引号，确保可被JSON.parse。例句生动、不机械。`;

  const userMsg = `汉字：“${ch}”。请生成包含该字的5个常用词语以及对应的地道英文释义、双语例句。`;

  const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userMsg }
      ],
      temperature: 0.75,
      max_tokens: 1400,
      response_format: { type: "json_object" }
    })
  });

  if (!response.ok) {
    let errorDetail = `API错误 ${response.status}`;
    if (response.status === 401) errorDetail = '无效的API Key，请检查密钥';
    else if (response.status === 429) errorDetail = '请求频率过高，请稍后再试';
    throw new Error(errorDetail);
  }

  const data = await response.json();
  let content = data.choices?.[0]?.message?.content || '';
  content = content.trim();
  if (content.startsWith('```json')) content = content.slice(7);
  else if (content.startsWith('```')) content = content.slice(3);
  if (content.endsWith('```')) content = content.slice(0, -3);
  content = content.trim();

  let parsed = JSON.parse(content);
  if (!Array.isArray(parsed)) {
    if (parsed.words && Array.isArray(parsed.words)) parsed = parsed.words;
    else throw new Error('返回格式不是数组');
  }
  const valid = parsed.filter(item =>
    item.word && typeof item.word === 'string' &&
    item.meaning && typeof item.meaning === 'string' &&
    item.example && typeof item.example === 'string' &&
    item.example_en && typeof item.example_en === 'string'
  ).slice(0, 6);
  
  if (valid.length === 0) throw new Error('有效词语不足');
  return valid;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderWordCards(wordItems, targetChar) {
  if (!wordItems || wordItems.length === 0) {
    vocabListDiv.innerHTML = `<div class="error-placeholder">✨ 没生成到词语，请检查网络或重试点击汉字。</div>`;
    return;
  }
  const fragment = document.createDocumentFragment();
  wordItems.forEach(item => {
    const word = item.word;
    const meaning = item.meaning;
    const example = item.example;
    const exampleEn = item.example_en;
    const highlightedWord = word.split('').map(c => c === targetChar ? `<span class="highlight">${escapeHtml(c)}</span>` : escapeHtml(c)).join('');
    
    const card = document.createElement('div');
    card.className = 'word-card';
    card.innerHTML = `
      <div class="word-header">
        <span class="word-text">${highlightedWord}</span>
        <span class="word-meaning">${escapeHtml(meaning)}</span>
      </div>
      <div class="example-section">
        <div class="example-cn">📖 ${escapeHtml(example)}</div>
        <div class="example-en">🔤 ${escapeHtml(exampleEn)}</div>
      </div>
    `;
    fragment.appendChild(card);
  });
  vocabListDiv.innerHTML = '';
  vocabListDiv.appendChild(fragment);
}

async function openPopup(ch, cell) {
  if (isFetching && currentRequestChar === ch) return;
  if (!currentApiKey || currentApiKey.trim() === '') {
    alert('请先点击右上角⚙️设置 DeepSeek API Key，再进行学习');
    return;
  }

  if (activeCell) activeCell.classList.remove('active');
  activeCell = cell;
  cell.classList.add('active');

  popupChar.textContent = ch;
  vocabListDiv.innerHTML = '';
  popupLoadingDiv.style.display = 'flex';
  popup.classList.add('visible');
  overlay.classList.add('visible');
  closeHint.classList.add('visible');

  isFetching = true;
  currentRequestChar = ch;
  try {
    const wordData = await fetchRealTimeWords(ch, currentApiKey);
    popupLoadingDiv.style.display = 'none';
    renderWordCards(wordData, ch);
  } catch (err) {
    popupLoadingDiv.style.display = 'none';
    let errorMsg = err.message || '生成失败，请重试。';
    if (errorMsg.includes('API Key')) errorMsg = 'DeepSeek API Key 无效或未设置，请重新配置。';
    vocabListDiv.innerHTML = `<div class="error-placeholder">⚠️ ${escapeHtml(errorMsg)}<br>💡 点击右上角齿轮重新设置有效API Key</div>`;
  } finally {
    isFetching = false;
    currentRequestChar = '';
  }
}

function closePopup() {
  popup.classList.remove('visible');
  overlay.classList.remove('visible');
  closeHint.classList.remove('visible');
  if (activeCell) {
    activeCell.classList.remove('active');
    activeCell = null;
  }
}
overlay.addEventListener('click', closePopup);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePopup(); });

// ======================= 设置面板逻辑 =======================
function showModal() {
  apiKeyInput.value = currentApiKey || '';
  apiStatusMsg.innerText = currentApiKey ? '✅ 已保存密钥 (隐藏显示)' : '⚠️ 未设置密钥，请填入DeepSeek Key';
  modal.classList.add('active');
}
function hideModal() {
  modal.classList.remove('active');
}
function saveApiKey() {
  const newKey = apiKeyInput.value.trim();
  if (newKey === '') {
    apiStatusMsg.innerText = '❌ 密钥不能为空，请输入有效的 DeepSeek API Key';
    return;
  }
  currentApiKey = newKey;
  localStorage.setItem('deepseek_key', newKey);
  apiStatusMsg.innerText = '✅ 密钥已保存！现在可以点击汉字学习啦～';
  setTimeout(() => {
    if (modal.classList.contains('active')) hideModal();
  }, 800);
}
settingsBtn.addEventListener('click', showModal);
saveApiBtn.addEventListener('click', saveApiKey);
cancelModalBtn.addEventListener('click', hideModal);
modal.addEventListener('click', (e) => {
  if (e.target === modal) hideModal();
});

if (currentApiKey) {
  console.log('DeepSeek API 已就绪');
} else {
  setTimeout(() => {
    if (!currentApiKey && !modal.classList.contains('active')) {
      apiStatusMsg.innerText = '未检测到API Key，请点击齿轮设置';
    }
  }, 500);
}
</script>
